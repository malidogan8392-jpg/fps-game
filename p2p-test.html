<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>P2P Bağlantı Testi</title>
<style>
  body{font-family:sans-serif;background:#111;color:#eee;padding:20px;max-width:600px;margin:0 auto;}
  h1{font-size:20px;}
  .box{background:#222;border-radius:8px;padding:14px;margin-bottom:14px;}
  #myId{font-size:22px;font-weight:bold;color:#4ade80;user-select:all;}
  input{width:100%;padding:10px;font-size:16px;box-sizing:border-box;margin-bottom:8px;border-radius:6px;border:1px solid #444;background:#333;color:#fff;}
  button{padding:10px 16px;font-size:16px;border-radius:6px;border:none;background:#4f46e5;color:#fff;cursor:pointer;}
  button:disabled{opacity:0.5;}
  #log{background:#000;padding:10px;border-radius:6px;height:220px;overflow-y:auto;font-family:monospace;font-size:13px;white-space:pre-wrap;}
  .ok{color:#4ade80;} .err{color:#f87171;} .info{color:#93c5fd;}
</style>
</head>
<body>
<h1>🔌 P2P Bağlantı Testi (PeerJS)</h1>

<div class="box">
  <div>Senin ID'n (diğer kişiye bunu söyle):</div>
  <div id="myId">yükleniyor...</div>
</div>

<div class="box">
  <div>Karşı tarafın ID'sini buraya yapıştır ve bağlan:</div>
  <input id="targetId" placeholder="karşı tarafın ID'si">
  <button id="connectBtn">Bağlan</button>
</div>

<div class="box">
  <div>Mesaj gönder (bağlantı kurulunca aktif olur):</div>
  <input id="msgInput" placeholder="test mesajı yaz..." disabled>
  <button id="sendBtn" disabled>Gönder</button>
</div>

<div class="box">
  <div style="margin-bottom:6px;">Kayıt (log):</div>
  <div id="log"></div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
function log(msg, cls){
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if(cls) line.className = cls;
  line.textContent = '['+new Date().toLocaleTimeString()+'] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

log('PeerJS başlatılıyor...', 'info');

// Peer nesnesi oluşturuluyor — PeerJS'in kendi ücretsiz, herkese açık eşleştirme
// (signaling) sunucusunu kullanıyoruz, biz hiçbir şey barındırmıyoruz.
const peer = new Peer();
let activeConn = null;

peer.on('open', id => {
  document.getElementById('myId').textContent = id;
  log('Hazır! Senin ID\'n: ' + id, 'ok');
});

peer.on('error', err => {
  log('HATA: ' + err.type + ' — ' + err.message, 'err');
});

// Karşı taraf BİZE bağlanırsa (biz "Bağlan"a basmadan) bu tetiklenir
peer.on('connection', conn => {
  log('Gelen bağlantı: ' + conn.peer, 'info');
  setupConnection(conn);
});

document.getElementById('connectBtn').onclick = () => {
  const targetId = document.getElementById('targetId').value.trim();
  if(!targetId){ log('Önce karşı tarafın ID\'sini yaz.', 'err'); return; }
  log('Bağlanılıyor: ' + targetId + ' ...', 'info');
  const conn = peer.connect(targetId);
  setupConnection(conn);
};

function setupConnection(conn){
  activeConn = conn;
  conn.on('open', () => {
    log('✅ BAĞLANTI KURULDU: ' + conn.peer, 'ok');
    document.getElementById('msgInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
  });
  conn.on('data', data => {
    log('📩 Gelen mesaj: ' + data, 'ok');
  });
  conn.on('close', () => {
    log('Bağlantı kapandı.', 'err');
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  });
  conn.on('error', err => {
    log('Bağlantı hatası: ' + err, 'err');
  });
}

document.getElementById('sendBtn').onclick = () => {
  const msg = document.getElementById('msgInput').value;
  if(!msg || !activeConn) return;
  activeConn.send(msg);
  log('📤 Gönderildi: ' + msg, 'info');
  document.getElementById('msgInput').value = '';
};
</script>
</body>
</html>
