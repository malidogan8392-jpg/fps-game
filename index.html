<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Online 3D FPS Oyun</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <script>
        const socket = io(); // Render ve yerel ortam için otomatik dinamik bağlantı
        let scene, camera, renderer;
        let myId;
        let playersData = {};
        let playerMeshes = {};
        let bullets = [];
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let clock = new THREE.Clock();

        // 3D Ortamı Başlat
        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7ec0ee); // Gökyüzü rengi

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.7, 0); // Oyuncu göz hizası

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Işıklandırma
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // Zemin (Harita alanı)
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x556b2f });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Klavye ve Fare Kontrolleri
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => handleKeys(e, true));
            document.addEventListener('keyup', (e) => handleKeys(e, false));
            
            document.body.addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, camera.rotation.x));
                }
            });

            document.addEventListener('mousedown', (e) => {
                if (e.button === 0 && document.pointerLockElement === document.body) {
                    shootBullet();
                }
            });
        }

        function handleKeys(e, isDown) {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') moveForward = isDown;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') moveBackward = isDown;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') moveLeft = isDown;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') moveRight = isDown;
        }

        // Oyuncu Modeli Oluşturucu (Karakter)
        function makePlayerMesh(team) {
            const group = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(0.6, 1.8, 0.4);
            const bodyMat = new THREE.MeshLambertMaterial({ color: team === 'red' ? 0xff0000 : 0x0000ff });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.9;
            group.add(body);
            return group;
        }

        // Mermi Fırlatma Mekaniği
        function shootBullet() {
            const bulletGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bulletMesh = new THREE.Mesh(bulletGeo, bulletMat);
            
            bulletMesh.position.copy(camera.position);
            bulletMesh.rotation.copy(camera.rotation);
            scene.add(bulletMesh);

            const bulletData = {
                x: bulletMesh.position.x, y: bulletMesh.position.y, z: bulletMesh.position.z,
                rx: bulletMesh.rotation.x, ry: bulletMesh.rotation.y, rz: bulletMesh.rotation.z
            };

            bullets.push({ mesh: bulletMesh, speed: 40, life: 2.0, mine: true });
            socket.emit('shoot', bulletData);
        }

        // Mermilerin İlerlemesi ve ÇARPIŞMA (HITBOX) Kontrolü
        function updateBullets(delta) {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.mesh.translateZ(-b.speed * delta);
                b.life -= delta;

                if (b.life <= 0) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                    continue;
                }

                // Mermiyi ben attıysam diğer oyunculara çarptı mı diye bak
                if (b.mine) {
                    for (const [id, mesh] of Object.entries(playerMeshes)) {
                        if (id === myId) continue;

                        // Sadece X ve Z eksenindeki yatay uzaklığı hesapla
                        const dx = b.mesh.position.x - mesh.position.x;
                        const dz = b.mesh.position.z - mesh.position.z;
                        const distanceXZ = Math.sqrt(dx * dx + dz * dz);

                        // Mermi dikeyde oyuncunun boy aralığındaysa ve yatayda çarptıysa hasarı tetikle
                        if (distanceXZ < 0.9 && b.mesh.position.y > 0 && b.mesh.position.y < 2.5) {
                            socket.emit('hit', { targetId: id });
                            scene.remove(b.mesh);
                            bullets.splice(i, 1);
                            break;
                        }
                    }
                }
            }
        }

        // --- NETWORK / SOCKET.IO OLAYLARI ---
        socket.on('init', (data) => {
            myId = data.myId;
            playersData = data.players;
            
            // İlk girişte beni sunucunun belirlediği rastgele konuma ışınla
            if(playersData[myId]) {
                camera.position.set(playersData[myId].x, 1.7, playersData[myId].z);
            }

            for (const [id, p] of Object.entries(playersData)) {
                if (id !== myId) {
                    playerMeshes[id] = makePlayerMesh(p.team);
                    playerMeshes[id].position.set(p.x, p.y, p.z);
                    scene.add(playerMeshes[id]);
                }
            }
        });

        socket.on('playerJoined', (p) => {
            playersData[p.id] = p;
            const mesh = makePlayerMesh(p.team);
            mesh.position.set(p.x, p.y, p.z);
            playerMeshes[p.id] = mesh;
            scene.add(mesh);
        });

        socket.on('playerMoved', (p) => {
            if (playerMeshes[p.id]) {
                playerMeshes[p.id].position.set(p.x, p.y, p.z);
                playerMeshes[p.id].rotation.set(p.rx, p.ry, p.rz);
            }
        });

        socket.on('bulletSpawned', (data) => {
            const bulletGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xff4500 });
            const bulletMesh = new THREE.Mesh(bulletGeo, bulletMat);
            bulletMesh.position.set(data.x, data.y, data.z);
            bulletMesh.rotation.set(data.rx, data.ry, data.rz);
            scene.add(bulletMesh);
            bullets.push({ mesh: bulletMesh, speed: 40, life: 2.0, mine: false });
        });

        // Bir oyuncu hasar aldığında
        socket.on('playerDamaged', (data) => {
            console.log(`Oyuncu ${data.id} hasar aldı. Yeni Canı: ${data.hp}`);
        });

        // Bir oyuncu öldüğünde ve yeniden doğduğunda
        socket.on('playerRespawned', (data) => {
            if (data.id === myId) {
                // Eğer ölen bensem kamerayı güvenli doğma noktasına taşı
                camera.position.set(data.x, 1.7, data.z);
                alert("Öldün! Yeniden doğuyorsun.");
            } else if (playerMeshes[data.id]) {
                // Ölen rakip veya dostsa onun modelini taşı
                playerMeshes[data.id].position.set(data.x, 0, data.z);
            }
            console.log(`Oyuncu ${data.id} yeniden doğdu.`);
        });

        socket.on('playerLeft', (id) => {
            if (playerMeshes[id]) {
                scene.remove(playerMeshes[id]);
                delete playerMeshes[id];
            }
            delete playersData[id];
        });

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // OYUN DÖNGÜSÜ (GAME LOOP)
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Yerel oyuncu hareket mekaniği
            const speed = 10 * delta;
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            direction.y = 0; // Uçmayı engelle
            direction.normalize();

            const sideDirection = new THREE.Vector3();
            sideDirection.copy(direction).applyAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI / 2);

            let moved = false;
            if (moveForward) { camera.position.addScaledVector(direction, speed); moved = true; }
            if (moveBackward) { camera.position.addScaledVector(direction, -speed); moved = true; }
            if (moveLeft) { camera.position.addScaledVector(sideDirection, speed); moved = true; }
            if (moveRight) { camera.position.addScaledVector(sideDirection, -speed); moved = true; }

            // Eğer hareket ettiysek sunucuya bildir
            if (moved && socket.connected) {
                socket.emit('move', {
                    x: camera.position.x,
                    y: 0,
                    z: camera.position.z,
                    rx: camera.rotation.x,
                    ry: camera.rotation.y,
                    rz: camera.rotation.z
                });
            }

            updateBullets(delta);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
