<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="theme-color" content="#e74c3c">
<link rel="manifest" href="/manifest.json">
<title>Online FPS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;overflow:hidden;font-family:Arial,sans-serif;color:white;user-select:none;touch-action:none;}
canvas{display:block;position:fixed;top:0;left:0;z-index:0;}
.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hidden{display:none!important;}

/* Auth UI */
#auth-screen{background:linear-gradient(135deg,#0a0a0a,#1a0a0a);}
#auth-screen h1{font-size:52px;color:#e74c3c;text-shadow:0 0 20px #e74c3c55;margin-bottom:6px;}
.auth-box{background:#111;border:1px solid #222;border-radius:14px;padding:26px;width:340px;max-width:95vw;margin-top:12px;}
.auth-tabs{display:flex;margin-bottom:15px;gap:10px;}
.auth-tabs button{flex:1;padding:10px;background:#1a1a1a;border:1px solid #333;color:#aaa;cursor:pointer;border-radius:6px;}
.auth-tabs button.active{background:#e74c3c;color:white;border-color:#e74c3c;}
.auth-box input{width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;color:white;margin-bottom:12px;border-radius:6px;}
.auth-box button.submit-btn{width:100%;padding:12px;background:#e74c3c;border:none;color:white;font-weight:bold;cursor:pointer;border-radius:6px;}
#auth-msg{color:#e74c3c;font-size:14px;margin-top:10px;text-align:center;}

/* Game HUD */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;}
#crosshair{position:absolute;top:50%;left:50%;width:8px;height:8px;background:white;border-radius:50%;transform:translate(-50%,-50%);opacity:0.6;}
.hud-bar{position:absolute;bottom:20px;background:rgba(0,0,0,0.6);padding:10px 20px;border-radius:8px;font-size:24px;font-weight:bold;}
#hp-bar{left:20px;color:#2ecc71;border-left:5px solid #2ecc71;}
#ammo-bar{right:20px;color:#f1c40f;border-right:5px solid #f1c40f;}
#score-board{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);padding:10px 30px;border-radius:8px;display:flex;gap:30px;font-size:20px;}
.t-red{color:#e74c3c;} .t-blue{color:#3498db;}
#overlay-msg{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:bold;text-shadow:0 0 10px black;}

/* Chat UI */
#chat-box {
    position: fixed; bottom: 120px; left: 20px; width: 320px; height: 160px;
    background: rgba(0,0,0,0.5); border-radius: 6px; display: flex; flex-direction: column;
    pointer-events: auto; z-index: 60; border: 1px solid rgba(255,255,255,0.1);
}
#chat-messages { flex: 1; padding: 8px; overflow-y: auto; font-size: 14px; line-height: 1.4; display: flex; flex-direction: column; gap: 4px; }
#chat-input { width: 100%; padding: 8px; background: rgba(20,20,20,0.8); border: none; border-top: 1px solid rgba(255,255,255,0.1); color: white; outline: none; border-radius: 0 0 6px 6px; }

/* Mobil Kontroller */
.mobile-ctrl { display: none; position: fixed; z-index: 99; pointer-events: auto; }
#joystick-zone { bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.3); }
#joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.7); border-radius: 50%; }
#mobile-fire-btn { bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(231,76,60,0.8); border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
#mobile-chat-btn { top: 20px; right: 20px; padding: 10px 15px; background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 6px; font-weight: bold; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="auth-screen" class="screen">
    <h1>ONLINE FPS</h1>
    <div class="auth-box">
        <div class="auth-tabs">
            <button id="tab-login" class="active" onclick="setAuthTab('login')">Giriş Yap</button>
            <button id="tab-register" onclick="setAuthTab('register')">Kayıt Ol</button>
        </div>
        <input type="text" id="auth-user" placeholder="Kullanıcı Adı" maxlength="15">
        <input type="password" id="auth-pass" placeholder="Şifre">
        <button class="submit-btn" onclick="submitAuth()">Oyna</button>
        <div id="auth-msg"></div>
    </div>
</div>

<div id="hud" class="hidden">
    <div id="crosshair"></div>
    <div id="hp-bar" class="hud-bar">HP: 100</div>
    <div id="ammo-bar" class="hud-bar">GLOCK</div>
    <div id="score-board">
        <div class="t-red">Kırmızı: <span id="score-red">0</span></div>
        <div id="timer">10:00</div>
        <div class="t-blue">Mavi: <span id="score-blue">0</span></div>
    </div>
    <div id="overlay-msg"></div>

    <div id="chat-box" class="hidden">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Mesaj yaz..." disabled>
    </div>
</div>

<div id="joystick-zone" class="mobile-ctrl"><div id="joystick-stick"></div></div>
<div id="mobile-fire-btn" class="mobile-ctrl">ATEŞ</div>
<button id="mobile-chat-btn" class="mobile-ctrl">CHAT</button>

<script>
const socket = io();
let myId, myTeam, username = "";
let phase = 'auth', authTab = 'login';
let health = 100, currentWeapon = 'glock', killPoints = 0, unlockedWeapons = ['glock'];

let scene, camera, renderer, clock = new THREE.Clock();
let players = {}, playerMeshes = {}, bullets = [];
let moveF = false, moveB = false, moveL = false, moveR = false;
let localWeaponMesh = null;

const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
let joyX = 0, joyY = 0;

// Orijinal UI Fonksiyonların (Hata vermemeleri için eksiksiz eklendi)
function updateHealth(hp) { document.getElementById('hp-bar').innerText = "HP: " + hp; }
function updatePts() {}
function updateWeaponSlots() {}
function closeShop() {}
function showOv(type, time) {
    const el = document.getElementById('overlay-msg');
    if(type === 'msg-killed') el.innerText = "ÖLDÜN!";
    if(type === 'msg-kill') el.innerText = "DÜŞMANI VURDUN!";
    setTimeout(() => { el.innerText = ""; }, time);
}

function setAuthTab(tab) {
    authTab = tab;
    document.getElementById('tab-login').className = tab === 'login' ? 'active' : '';
    document.getElementById('tab-register').className = tab === 'register' ? 'active' : '';
}

function submitAuth() {
    username = document.getElementById('auth-user').value.trim();
    const pass = document.getElementById('auth-pass').value;
    if(!username || !pass) return;
    socket.emit('auth', { type: authTab, username, password: pass });
}

socket.on('authRes', (d) => {
    if(d.success) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        if(isMobile) {
            document.querySelectorAll('.mobile-ctrl').forEach(el => el.style.display = 'flex');
            setupMobileControls();
        }
        phase = 'play';
        init3D();
        socket.emit('joinGame', { username: d.username });
    } else {
        document.getElementById('auth-msg').innerText = d.msg;
    }
});

function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdff0d8);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 1000);
    camera.position.set(0, 1.7, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(light);

    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    if(!isMobile) {
        document.body.addEventListener('click', (e) => {
            if(document.activeElement === document.getElementById('chat-input')) return;
            document.body.requestPointerLock();
        });
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.0025;
            }
        });
        document.addEventListener('mousedown', (e) => {
            if(e.button === 0 && document.pointerLockElement === document.body && health > 0) fireWeapon();
        });
    }

    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    createCSWeaponMesh('glock');
    animate();
}

// CS 1.6 Birinci Şahıs Performans Silahı
function createCSWeaponMesh(type) {
    if (localWeaponMesh) camera.remove(localWeaponMesh);
    localWeaponMesh = new THREE.Group();
    
    let length = 0.35, radius = 0.025, color = 0x222222;
    if (type === 'sniper') { length = 0.75; radius = 0.02; color = 0x2d3e2d; }
    else if (type === 'uzi') { length = 0.32; radius = 0.032; color = 0x3d3d3d; }

    const barrelGeo = new THREE.CylinderGeometry(radius, radius, length, 6);
    barrelGeo.rotateX(Math.PI / 2);
    const barrelMat = new THREE.MeshBasicMaterial({ color: color });
    const barrel = new THREE.Mesh(barrelGeo, barrelMat);
    barrel.position.set(0, 0, -length / 2);
    localWeaponMesh.add(barrel);

    const gripGeo = new THREE.BoxGeometry(radius * 1.4, 0.12, radius * 1.4);
    gripGeo.rotateX(Math.PI / 6);
    const gripMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
    const grip = new THREE.Mesh(gripGeo, gripMat);
    grip.position.set(0, -0.07, -0.04);
    localWeaponMesh.add(grip);

    localWeaponMesh.position.set(0.16, -0.14, -0.32);
    camera.add(localWeaponMesh);
    document.getElementById('ammo-bar').innerText = type.toUpperCase();
}

function fireWeapon() {
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    const ox = camera.position.x;
    const oy = camera.position.y - 0.2;
    const oz = camera.position.z;

    socket.emit('fire', { ox, oy, oz, dx: dir.x, dy: dir.y, dz: dir.z });
    spawnBullet(new THREE.Vector3(ox, oy, oz), dir, true);

    if (localWeaponMesh) {
        localWeaponMesh.position.z += 0.04;
        localWeaponMesh.position.y += 0.015;
    }
}

function spawnBullet(origin, dir, isMine) {
    const geo = new THREE.SphereGeometry(0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: isMine ? 0xffffff : 0xffaa00 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(origin);
    scene.add(mesh);
    bullets.push({ mesh, dir, life: 1.2, mine: isMine });
}

function setupMobileControls() {
    const zone = document.getElementById('joystick-zone');
    const stick = document.getElementById('joystick-stick');
    let touchId = null;

    zone.addEventListener('touchstart', (e) => { touchId = e.changedTouches[0].identifier; });
    zone.addEventListener('touchmove', (e) => {
        for(let t of e.touches) {
            if(t.identifier === touchId) {
                const rect = zone.getBoundingClientRect();
                const cX = rect.left + rect.width / 2;
                const cY = rect.top + rect.height / 2;
                let dx = t.clientX - cX; let dy = t.clientY - cY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist > 50) { dx = (dx/dist)*50; dy = (dy/dist)*50; }
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                joyX = dx / 50; joyY = dy / 50;
            }
        }
    });

    const resetJoy = (e) => {
        for(let t of e.changedTouches) {
            if(t.identifier === touchId) { touchId = null; joyX = 0; joyY = 0; stick.style.transform = `translate(0px, 0px)`; }
        }
    };
    zone.addEventListener('touchend', resetJoy);
    
    let lookTouchId = null, lastTouchX = 0;
    window.addEventListener('touchstart', (e) => {
        for(let t of e.changedTouches) {
            if(t.clientX > window.innerWidth / 2 && e.target.className !== 'mobile-ctrl' && e.target.id !== 'mobile-chat-btn') {
                lookTouchId = t.identifier; lastTouchX = t.clientX;
            }
        }
    });
    window.addEventListener('touchmove', (e) => {
        for(let t of e.touches) {
            if(t.identifier === lookTouchId) {
                let mX = t.clientX - lastTouchX;
                camera.rotation.y -= mX * 0.006; lastTouchX = t.clientX;
            }
        }
    });
    window.addEventListener('touchend', (e) => {
        for(let t of e.changedTouches) { if(t.identifier === lookTouchId) lookTouchId = null; }
    });

    document.getElementById('mobile-fire-btn').addEventListener('touchstart', (e) => {
        e.preventDefault(); if(health > 0) fireWeapon();
    });

    document.getElementById('mobile-chat-btn').addEventListener('click', () => {
        const box = document.getElementById('chat-box');
        const inp = document.getElementById('chat-input');
        if(box.classList.contains('hidden')) {
            box.classList.remove('hidden'); inp.disabled = false; inp.focus();
        } else {
            const text = inp.value.trim();
            if(text.length > 0) socket.emit('chatMessage', text);
            inp.value = ''; inp.disabled = true; box.classList.add('hidden');
        }
    });
}

function handleKeyDown(e) {
    const chatInput = document.getElementById('chat-input');
    const box = document.getElementById('chat-box');
    
    if (e.code === 'Enter' && !isMobile) {
        box.classList.remove('hidden');
        if (document.pointerLockElement === document.body) {
            document.exitPointerLock();
            chatInput.disabled = false; chatInput.focus();
        } else if (document.activeElement === chatInput) {
            const text = chatInput.value.trim();
            if (text.length > 0) socket.emit('chatMessage', text);
            chatInput.value = ''; chatInput.disabled = true; chatInput.blur();
            document.body.requestPointerLock();
        }
        return;
    }

    if(document.activeElement === chatInput) return;
    if(e.code === 'KeyW') moveF = true;
    if(e.code === 'KeyS') moveB = true;
    if(e.code === 'KeyA') moveL = true;
    if(e.code === 'KeyD') moveR = true;
}

function handleKeyUp(e) {
    if(e.code === 'KeyW') moveF = false;
    if(e.code === 'KeyS') moveB = false;
    if(e.code === 'KeyA') moveL = false;
    if(e.code === 'KeyD') moveR = false;
}

function createPlayerMesh(team) {
    const group = new THREE.Group();
    const colorHex = team === 'red' ? 0xe74c3c : 0x3498db;
    const bodyGeo = new THREE.BoxGeometry(0.6, 1.8, 0.4);
    const bodyMat = new THREE.MeshLambertMaterial({ color: colorHex });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.9;
    group.add(body);
    return group;
}

socket.on('init', (d) => {
    myId = d.id; myTeam = d.myTeam; players = d.players;
    if(players[myId]) {
        camera.position.set(players[myId].x, 1.7, players[myId].z);
        currentWeapon = players[myId].weapon;
        createCSWeaponMesh(currentWeapon);
    }
    for(let id in players) {
        if(id !== myId) {
            playerMeshes[id] = createPlayerMesh(players[id].team);
            playerMeshes[id].position.set(players[id].x, 0, players[id].z);
            scene.add(playerMeshes[id]);
        }
    }
});

socket.on('playerJoined', (p) => {
    players[p.id] = p;
    playerMeshes[p.id] = createPlayerMesh(p.team);
    playerMeshes[p.id].position.set(p.x, 0, p.z);
    scene.add(playerMeshes[p.id]);
});

socket.on('playerMoved', (d) => {
    if(playerMeshes[d.id]) {
        playerMeshes[d.id].position.set(d.x, 0, d.z);
        playerMeshes[d.id].rotation.y = d.rotY;
    }
});

socket.on('bulletFired', (d) => {
    spawnBullet(new THREE.Vector3(d.ox, d.oy, d.oz), new THREE.Vector3(d.dx, d.dy, d.dz), false);
});

socket.on('chatMessage', (data) => {
    const box = document.getElementById('chat-box');
    box.classList.remove('hidden');
    const messagesDiv = document.getElementById('chat-messages');
    const msgElement = document.createElement('div');
    msgElement.innerHTML = `<span style="color: ${data.color}; font-weight: bold;">[${data.team.toUpperCase()}] ${data.sender}:</span> <span style="color: #fff;">${data.text}</span>`;
    messagesDiv.appendChild(msgElement);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

socket.on('damaged', (d) => {
    if(d.id === myId) { health = d.health; updateHealth(health); }
});

socket.on('playerDied', (d) => {
    if(d.deadId === myId) { health = 0; updateHealth(0); showOv('msg-killed', 2000); }
    if(d.killerId === myId) { showOv('msg-kill', 1500); }
});

socket.on('respawn', (d) => {
    if(d.id === myId) {
        health = 100; updateHealth(100);
        camera.position.set(d.x, 1.7, d.z);
    } else if(playerMeshes[d.id]) { playerMeshes[d.id].position.set(d.x, 0, d.z); }
});

socket.on('teamKills', (tk) => {
    document.getElementById('score-red').innerText = tk.red; document.getElementById('score-blue').innerText = tk.blue;
});

socket.on('timeSync', (d) => {
    let min = Math.floor(d.timeLeft / 60); let sec = d.timeLeft % 60;
    document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
});

socket.on('shopOk', (d) => {
    unlockedWeapons = d.unlocked; killPoints = d.killPoints;
    updateWeaponSlots(); updatePts();
    if(d.weaponId) { currentWeapon = d.weaponId; createCSWeaponMesh(d.weaponId); }
    closeShop();
});

socket.on('weaponChanged', (d) => {
    if(players[d.id]) players[d.id].weapon = d.weapon;
});

socket.on('playerLeft', (id) => {
    if(playerMeshes[id]) { scene.remove(playerMeshes[id]); delete playerMeshes[id]; }
    delete players[id];
});

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if(phase === 'play' && health > 0) {
        const speed = 8 * delta;
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        dir.y = 0; dir.normalize();
        const side = new THREE.Vector3(-dir.z, 0, dir.x);
        let moved = false;

        if(!isMobile) {
            if(moveF) { camera.position.addScaledVector(dir, speed); moved = true; }
            if(moveB) { camera.position.addScaledVector(dir, -speed); moved = true; }
            if(moveL) { camera.position.addScaledVector(side, -speed); moved = true; }
            if(moveR) { camera.position.addScaledVector(side, speed); moved = true; }
        } else {
            if(joyX !== 0 || joyY !== 0) {
                camera.position.addScaledVector(dir, -joyY * speed);
                camera.position.addScaledVector(side, -joyX * speed);
                moved = true;
            }
        }
        if(moved) {
            socket.emit('move', { x: camera.position.x, z: camera.position.z, rotY: camera.rotation.y });
        }
    }

    if (localWeaponMesh) {
        localWeaponMesh.position.x += (0.16 - localWeaponMesh.position.x) * 0.15;
        localWeaponMesh.position.y += (-0.14 - localWeaponMesh.position.y) * 0.15;
        localWeaponMesh.position.z += (-0.32 - localWeaponMesh.position.z) * 0.15;
    }

    for(let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.mesh.position.addScaledVector(b.dir, 45 * delta);
        b.life -= delta;
        if(b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); continue; }

        if(b.mine) {
            for(let id in playerMeshes) {
                let mesh = playerMeshes[id];
                let dist = b.mesh.position.distanceTo(new THREE.Vector3(mesh.position.x, b.mesh.position.y, mesh.position.z));
                if(dist < 0.9 && b.mesh.position.y > 0 && b.mesh.position.y < 2.5) {
                    socket.emit('hit', { targetId: id });
                    scene.remove(b.mesh); bullets.splice(i, 1);
                    break;
                }
            }
        }
    }
    renderer.render(scene, camera);
}
</script>
</body>
</html>
