<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e74c3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FPS Oyunu">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Online FPS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; }
#crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px; pointer-events: none;
}
#crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: white;
}
#crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
#crosshair::after  { width: 20px; height: 2px; left: 0; top: 9px; }
#hud {
    position: fixed; bottom: 20px; left: 20px;
    color: white; font-size: 18px; text-shadow: 1px 1px 2px #000;
}
#healthbar-bg {
    width: 200px; height: 16px; background: #333; border-radius: 8px; margin-top: 6px;
}
#healthbar {
    width: 200px; height: 16px; background: #e74c3c; border-radius: 8px;
    transition: width 0.2s;
}
#scoreboard {
    position: fixed; top: 20px; right: 20px;
    color: white; font-size: 14px; text-shadow: 1px 1px 2px #000;
    background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
    min-width: 180px;
}
#scoreboard h3 { margin-bottom: 6px; font-size: 15px; border-bottom: 1px solid #555; padding-bottom: 4px; }
#start-screen {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: white; z-index: 100;
}
#start-screen h1 { font-size: 48px; margin-bottom: 10px; color: #e74c3c; }
#start-screen p  { font-size: 18px; margin-bottom: 30px; color: #aaa; }
#start-btn {
    padding: 14px 40px; font-size: 20px; background: #e74c3c;
    color: white; border: none; border-radius: 8px; cursor: pointer;
}
#start-btn:hover { background: #c0392b; }
#killed-msg {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%);
    color: #e74c3c; font-size: 36px; font-weight: bold;
    text-shadow: 2px 2px 4px #000; display: none; pointer-events: none;
}
#kill-msg {
    position: fixed; top: 35%; left: 50%; transform: translate(-50%,-50%);
    color: #2ecc71; font-size: 28px; font-weight: bold;
    text-shadow: 2px 2px 4px #000; display: none; pointer-events: none;
}
#ammo { position: fixed; bottom: 20px; right: 30px; color: white; font-size: 22px; text-shadow: 1px 1px 2px #000; }
#controls-hint { position: fixed; bottom: 70px; left: 20px; color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<div id="start-screen">
    <h1>🔫 Online FPS</h1>
    <p>Çok oyunculu tarayıcı FPS oyunu</p>
    <p style="font-size:14px;color:#777;margin-bottom:20px">WASD: Hareket &nbsp;|&nbsp; Fare: Bak &nbsp;|&nbsp; Sol Tık: Ateş</p>
    <button id="start-btn" onclick="startGame()">OYNA</button>
</div>
<div id="crosshair"></div>
<div id="hud">
    <span id="health-text">❤️ 100</span>
    <div id="healthbar-bg"><div id="healthbar"></div></div>
</div>
<div id="scoreboard">
    <h3>🏆 Skor</h3>
    <div id="score-list"></div>
</div>
<div id="ammo">🔫 ∞</div>
<div id="controls-hint">WASD Hareket | Fare Bak | Sol Tık Ateş</div>
<div id="killed-msg">ÖLDÜRÜLDÜN!</div>
<div id="kill-msg">+1 KİLL 💀</div>

<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
let socket, myId, scene, camera, renderer;
let players = {}, bullets = [], playerMeshes = {};
let keys = {}, yaw = 0, pitch = 0;
let health = 100, started = false;
let canShoot = true, lastShot = 0;
const SPEED = 0.1, BULLET_SPEED = 0.8, SHOOT_COOLDOWN = 400;
const WALL_POSITIONS = [
    {x:0,z:-12,w:24,d:1},{x:0,z:12,w:24,d:1},
    {x:-12,z:0,w:1,d:24},{x:12,z:0,w:1,d:24},
    {x:-5,z:-5,w:4,d:1},{x:5,z:5,w:4,d:1},
    {x:-5,z:5,w:1,d:4},{x:5,z:-5,w:1,d:4},
    {x:0,z:0,w:2,d:2}
];

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    init();
}

function init() {
    started = true;
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 10, 40);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
    camera.position.set(0, 1.7, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Işık
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    // Zemin
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(24, 24),
        new THREE.MeshLambertMaterial({ color: 0x4a7c3f })
    );
    floor.rotation.x = -Math.PI/2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Duvarlar
    WALL_POSITIONS.forEach(w => {
        const wall = new THREE.Mesh(
            new THREE.BoxGeometry(w.w, 3, w.d),
            new THREE.MeshLambertMaterial({ color: 0x8B4513 })
        );
        wall.position.set(w.x, 1.5, w.z);
        wall.castShadow = true;
        wall.receiveShadow = true;
        scene.add(wall);
    });

    // Pointer lock
    renderer.domElement.addEventListener('click', () => {
        renderer.domElement.requestPointerLock();
    });
    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement !== renderer.domElement) {
            // unlocked
        }
    });
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement !== renderer.domElement) return;
        yaw   -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
    });
    document.addEventListener('mousedown', (e) => {
        if (e.button === 0 && document.pointerLockElement === renderer.domElement) shoot();
    });
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup',   e => keys[e.code] = false);
    window.addEventListener('resize', () => {
        camera.aspect = innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });

    connectSocket();
    animate();
}

function connectSocket() {
    socket = io();
    socket.on('init', (data) => {
        myId = data.id;
        players = data.players;
        Object.keys(players).forEach(id => {
            if (id !== myId) addPlayerMesh(id, players[id]);
        });
        updateScoreboard();
    });
    socket.on('playerJoined', (p) => {
        players[p.id] = p;
        addPlayerMesh(p.id, p);
        updateScoreboard();
    });
    socket.on('playerLeft', (id) => {
        if (playerMeshes[id]) { scene.remove(playerMeshes[id]); delete playerMeshes[id]; }
        delete players[id];
        updateScoreboard();
    });
    socket.on('playerMoved', (d) => {
        if (players[d.id]) { players[d.id].x = d.x; players[d.id].y = d.y; players[d.id].z = d.z; players[d.id].rotY = d.rotY; }
        if (playerMeshes[d.id]) {
            playerMeshes[d.id].position.set(d.x, d.y + 0.9, d.z);
            playerMeshes[d.id].rotation.y = d.rotY;
        }
    });
    socket.on('bulletFired', (d) => {
        spawnBullet(new THREE.Vector3(d.ox, d.oy, d.oz), new THREE.Vector3(d.dx, d.dy, d.dz), false, d.id);
    });
    socket.on('playerDied', (d) => {
        if (d.deadId === myId) {
            health = 100;
            updateHealth(100);
            camera.position.set((Math.random()-0.5)*16, 1.7, (Math.random()-0.5)*16);
            showMsg('killed-msg', 2000);
        }
        if (d.killerId === myId) showMsg('kill-msg', 1500);
        updateScoreboard();
    });
    socket.on('damaged', (d) => {
        health = d.health;
        updateHealth(d.health);
    });
    socket.on('scoreUpdate', (d) => {
        if (players[d.id]) { players[d.id].kills = d.kills; players[d.id].deaths = d.deaths; }
        updateScoreboard();
    });
}

function addPlayerMesh(id, p) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.6, 1.8, 0.4),
        new THREE.MeshLambertMaterial({ color: p.color || '#3498db' })
    );
    const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.5, 0.5),
        new THREE.MeshLambertMaterial({ color: '#ffd9b3' })
    );
    head.position.y = 1.15;
    group.add(body);
    group.add(head);
    group.position.set(p.x, p.y + 0.9, p.z);
    scene.add(group);
    playerMeshes[id] = group;
}

function shoot() {
    const now = Date.now();
    if (now - lastShot < SHOOT_COOLDOWN) return;
    lastShot = now;
    const dir = new THREE.Vector3(0, 0, -1);
    dir.applyEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
    const origin = camera.position.clone();
    spawnBullet(origin, dir, true, myId);
    socket.emit('shoot', { ox: origin.x, oy: origin.y, oz: origin.z, dx: dir.x, dy: dir.y, dz: dir.z });
}

function spawnBullet(origin, dir, isMine, shooterId) {
    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 6, 6),
        new THREE.MeshBasicMaterial({ color: isMine ? 0xffff00 : 0xff6600 })
    );
    mesh.position.copy(origin);
    scene.add(mesh);
    bullets.push({ mesh, dir: dir.clone().normalize(), isMine, shooterId, life: 80 });
}

function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.mesh.position.addScaledVector(b.dir, BULLET_SPEED);
        b.life--;

        if (b.isMine) {
            for (const [id, mesh] of Object.entries(playerMeshes)) {
                if (id === myId) continue;
                const dist = b.mesh.position.distanceTo(mesh.position);
                if (dist < 0.8) {
                    socket.emit('hit', { targetId: id });
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                    break;
                }
            }
        }

        if (b.life <= 0) {
            scene.remove(b.mesh);
            bullets.splice(i, 1);
        }
    }
}

function movePlayer() {
    const speed = SPEED;
    const fwd  = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
    let moved = false;
    if (keys['KeyW']) { camera.position.addScaledVector(fwd, speed); moved = true; }
    if (keys['KeyS']) { camera.position.addScaledVector(fwd, -speed); moved = true; }
    if (keys['KeyA']) { camera.position.addScaledVector(right, -speed); moved = true; }
    if (keys['KeyD']) { camera.position.addScaledVector(right, speed); moved = true; }

    // Sınır
    camera.position.x = Math.max(-11, Math.min(11, camera.position.x));
    camera.position.z = Math.max(-11, Math.min(11, camera.position.z));
    camera.position.y = 1.7;

    if (moved && socket) {
        socket.emit('move', { x: camera.position.x, y: 0, z: camera.position.z, rotY: yaw });
    }
}

function updateHealth(h) {
    document.getElementById('health-text').textContent = '❤️ ' + h;
    document.getElementById('healthbar').style.width = (h * 2) + 'px';
    const color = h > 50 ? '#2ecc71' : h > 25 ? '#f39c12' : '#e74c3c';
    document.getElementById('healthbar').style.background = color;
}

function updateScoreboard() {
    const list = document.getElementById('score-list');
    const sorted = Object.values(players).sort((a,b) => b.kills - a.kills);
    list.innerHTML = sorted.map(p =>
        `<div style="color:${p.color};padding:2px 0">${p.id === myId ? '► ' : ''}${p.name} &nbsp; ${p.kills || 0}/${p.deaths || 0}</div>`
    ).join('');
}

function showMsg(id, ms) {
    const el = document.getElementById(id);
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', ms);
}

function animate() {
    requestAnimationFrame(animate);
    if (!started) return;
    movePlayer();
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
    updateBullets();
    renderer.render(scene, camera);
}
</script>
</body>
</html>
